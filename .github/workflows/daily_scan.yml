name: Daily Remote Emby Scan

on:
  schedule:
    # 每天北京时间早上 5:30 自动运行 (国际标准时间 UTC 21:30)
    - cron: '30 21 * * *'
  workflow_dispatch: # 允许你随时在 GitHub 网页上点击手动触发运行

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Full Scan Script
      run: python scan_remote_all.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add remote_list.txt remote_cache_metadata.json
        # 只有在文件有变动时才提交，防止没有更新时报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自动更新全站扫描清单 [$(date '+%Y-%m-%d %H:%M:%S')]" && git push)
